apiVersion: v1
kind: Service 
metadata:
  name: nginx-svc
  labels:
    app: nginx-svc    # This will show Services with label app=nginx-svc
                      # kubectl get svc -l app=nginx-svc
spec:
  type: ClusterIP
  ports:              
    - port: 80        # port on which the Service listens for incoming traffic.
      protocol: TCP
      targetPort: 80  # where traffic should re-direct
  selector: 
    app: nginx        # service gonna looks pods have this label
