apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  labels:
    app: django
  annotations:
    "kubernetes.io/change-cause": "initial state"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
      - name: django
        image: duvindune/repo7:v1.0
        ports:
          - containerPort: 8000

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "192Mi"
            cpu: "750m"